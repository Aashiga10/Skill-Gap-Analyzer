<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - SkillSync AI</title>
  <link rel="stylesheet" href="style1.css">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="signup-container">

  <!-- Logo -->
  <div class="logo">
    <span class="logo-icon">✦</span>
    <span class="logo-text">SkillSync AI</span>
  </div>

  <!-- Heading -->
  <h1>Create Account</h1>
  <p class="subtitle">Start your skill journey today</p>

  <!-- Form -->
  <form id="signupForm">

    <div class="input-box">
      <i class="fa fa-user"></i>
      <input type="text" placeholder="Full Name" required>
    </div>

    <div class="input-box">
      <i class="fa fa-envelope"></i>
      <input type="email" placeholder="Email address" required>
    </div>

    <div class="input-box">
      <i class="fa fa-lock"></i>
      <input type="password" placeholder="Password" required>
    </div>

    <button type="submit" class="signup-btn">
      Create Account →
    </button>

  </form>

  <!-- Divider -->
  <div class="divider">
    <span></span>
    <p>OR</p>
    <span></span>
  </div>

  <!-- Google Button -->
  <button class="google-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png">
    Continue with Google
  </button>

  <!-- Login link -->
  <p class="login-text">
    Already have an account? <a href="loginpage.html">Sign In</a>
  </p>

</div>
<script src="script.js"></script>
</body>
</html>
