<div class="main-content">
<div class="container">

  <h1><span>Progress</span> Tracker</h1>
  <p id="roleText">Track your learning progress...</p>
  <!-- PROGRESS BOX -->
  <div class="card">
    <div class="top">
      <div>
        <h3>Overall Completion</h3>
        <p id="progressText">0 of 0 skills completed</p>
      </div>
      <h2 id="percent">0%</h2>
    </div>

    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>
  </div>

  <!-- CHECKLIST -->
  <div class="card">
    <h3>Skill Checklist</h3>
    <div id="skillsList"></div>
  </div>

</div>
