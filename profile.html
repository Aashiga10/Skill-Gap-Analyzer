<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="profile.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
  <nav class="navbar navbar-expand-lg px-5">
    <a class="navbar-brand" href="login.html">✨ SkillSync AI</a>
    <div class="ms-auto">
      <button id="themeToggle">🌙</button>
      <a href="home.html" class="btn btn-outline-primary">Back</a>
    </div>
  </nav>

<div class="container">
  <h1 class="title">👤Profile</h1>

  <!-- USER CARD -->
  <div class="card profile-card">
    <div class="profile-top">
      <div class="avatar" id="avatar">S</div>
      <div>
        <h2 id="name">Student</h2>
        <p id="email">student@example.com</p>
      </div>
    </div>

    <div class="details">
      <p>👤 Name: <span id="nameDetail">Student</span></p>
      <p>📧 Email: <span id="emailDetail">student@example.com</span></p>
      <p>🎯 Dream Job: <span id="job">Not set</span></p>
    </div>
  </div>

  <!-- SKILLS -->
  <div class="card">
    <h3>✨ Skills Learned</h3>
    <div id="skillsContainer">
      <p>No skills completed yet. Start learning!</p>
    </div>
  </div>

  <!-- GOALS -->
  <div class="card">
    <h3>🎯 Goals</h3>
    <div id="goalsContainer">
      <p>Set your dream job to see goals here.</p>
    </div>
  </div>

  <!-- PROGRESS TRACKER -->
<div class="card">
  <h3>📈 Learning Progress</h3>
  <div id="skillsList"></div>
  <h4>Progress: <span id="percent">0%</span></h4>
</div>

  <!-- LOGOUT -->
  <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  
</div>
<script>// DARK MODE
document.getElementById("themeToggle").onclick = () => {
  document.body.classList.toggle("dark");
};

        // LOGOUT
function logout() {
  alert("Logged out!");
  window.location.href = "login.html";
}
</script>
<!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  
  <!-- JS -->
<script src="profile.js"></script>

</body>
</html>
